name: Publish to npm

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - run: npm install
      - name: Publish if version not already published
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "airline-codes@$VERSION" version &>/dev/null; then
            echo "Version $VERSION already published, skipping."
          else
            unset NODE_AUTH_TOKEN && npm publish --provenance --access public
          fi
